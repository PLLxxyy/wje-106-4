name: wjefooddiary

services:
  frontend:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME:-wjefooddiary}-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-28606}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
